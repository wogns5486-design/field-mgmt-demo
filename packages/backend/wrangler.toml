name = "field-mgmt-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "field-mgmt-db"
database_id = "local"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "field-mgmt-photos"

[vars]
CORS_ORIGIN = "*"
JWT_SECRET = "dev-secret-change-in-production"

[env.production]
name = "field-mgmt-api-prod"

[env.production.vars]
CORS_ORIGIN = "https://field-mgmt.example.com"
JWT_SECRET = "CHANGE_ME_IN_PRODUCTION"

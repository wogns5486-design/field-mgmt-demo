name = "field-mgmt-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "field-mgmt-db"
database_id = "local"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "field-mgmt-photos"

[vars]
CORS_ORIGIN = "*"
